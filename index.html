<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Meyer | Asteroids Portfolio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="booting">
    <main class="space-stage" aria-label="Asteroids-style personal homepage">
      <canvas id="game" aria-label="Asteroids game canvas"></canvas>

      <section class="startup-screen" id="startup-screen" aria-hidden="true">
        <div class="startup-core">
          <h2 class="startup-title startup-step is-visible" id="startup-name">
            Alex Meyeroids
          </h2>
          <div class="startup-step is-visible" id="startup-controls">
            <p class="startup-subtitle">Controls</p>
            <ul class="startup-controls-list">
              <li>
                <span class="startup-key">Up</span>
                <span class="startup-action">Thrust</span>
              </li>
              <li>
                <span class="startup-key">Left</span>
                <span class="startup-action">Rotate CCW</span>
              </li>
              <li>
                <span class="startup-key">Right</span>
                <span class="startup-action">Rotate CW</span>
              </li>
              <li>
                <span class="startup-key">Space</span>
                <span class="startup-action">Fire</span>
              </li>
            </ul>
          </div>
          <button
            class="startup-play is-visible"
            id="startup-play"
            type="button"
            disabled
          >
            Play
          </button>
        </div>
      </section>

    </main>

    <script src="./asteroids.js"></script>
  </body>
</html>
